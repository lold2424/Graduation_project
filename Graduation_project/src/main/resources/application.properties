server.port=8080
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/security?serverTimezone=Asia/Seoul
spring.datasource.username="DB username"
spring.datasource.password="DB password"

spring.mvc.view.prefix=/templates/
spring.mvc.view.suffix=.mustache

spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true

jwt.time.access=3600000
jwt.time.refresh=604800000
jwt.secret.access="random data"
jwt.secret.refresh="random data"

spring.security.oauth2.client.registration.google.client-id="client id"
spring.security.oauth2.client.registration.google.client-secret="client secret"
spring.security.oauth2.client.registration.google.scope=email,profile
